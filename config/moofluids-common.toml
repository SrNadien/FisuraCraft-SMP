#The number of ticks before you can milk a fluid cow again
# Default: 3600
# Range: > 0
defaultMilkingCooldown = 50
#Whether fluid cows should spawn naturally
naturalSpawning = true
#Milk can be obtained from fluids cows when on cooldown.
milkCow = false
#A list of modid:fluid to blacklist from spawning.
#Can also use modid:* to disable all fluids from a mod.
fluidBlacklist = []
#Restrict specific fluid cows to spawn only in specific dimensions.
#Format: 'modid:fluid->modid:dimension'
#Example: 'minecraft:water->minecraft:overworld'
#Example: 'minecraft:lava->minecraft:the_nether'
#Example: 'kubejs:fluid_ender->minecraft:the_end'
dimensionSpawnRestrictions = []
#Blacklist specific biomes from spawning all fluid cows.
#Format: 'modid:biome' or use tags like '#modid:biome_tag'
#Example: 'minecraft:deep_dark'
#Example: 'minecraft:mushroom_fields'
#Example: '#minecraft:is_ocean' to blacklist all ocean biomes
biomeSpawnBlacklist = ["minecraft:deep_dark"]
#Whitelist specific biomes for spawning fluid cows (empty = all biomes allowed).
#If this list is not empty, ONLY these biomes will allow fluid cow spawns.
#Format: 'modid:biome' or use tags like '#modid:biome_tag'
#Example: 'minecraft:plains'
#Example: '#minecraft:is_overworld' to allow only overworld biomes
biomeSpawnWhitelist = []
#The amount of fluid the cow jar can hold
# Default: 32000
# Range: > 0
cowJarCapacity = 32000
